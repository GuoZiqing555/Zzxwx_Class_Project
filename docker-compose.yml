services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QUOTA_DB_PATH: /app/data/quota.sqlite3
    volumes:
      - quota-data:/app/data
    expose:
      - "8504"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8504/_stcore/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  quota-data:
  caddy-data:
  caddy-config:
